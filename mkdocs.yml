site_name: Laravel Bitemporal
site_description: Effective-dated and bitemporal models for Laravel 11+.
site_url: https://vusys.github.io/laravel-bitemporal/
repo_url: https://github.com/Vusys/laravel-bitemporal
repo_name: Vusys/laravel-bitemporal
edit_uri: edit/master/docs/

docs_dir: docs

validation:
  nav:
    omitted_files: info

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Fira Sans
    code: Fira Code
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      extend_pygments_lang:
        - name: php
          lang: php
          options:
            startinline: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/codehilite.css

nav:
  - Home: index.md
  - Concepts: 01-concepts.md
  - Installation: 02-installation.md
  - Defining models: 03-defining-models.md
  - Reading: 04-reading.md
  - Writing: 05-writing.md
  - Dimensions: 06-dimensions.md
  - The as-of lens: 07-as-of-lens.md
  - Events: 08-events.md
  - Configuration:
      - Overview: 09-configuration.md
      - Exception catalogue: 09a-exception-catalogue.md
  - Testing: 10-testing.md
  - Temporal pivots: 11-pivots.md
  - Diffs and timelines: 12-diffs-and-timelines.md
  - Boot guards and lints: 13-boot-guards-and-lints.md
  - Commands: 14-commands.md
