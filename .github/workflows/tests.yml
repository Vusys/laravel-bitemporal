name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        db: [sqlite, mysql, mariadb, pgsql]
        exclude:
          - laravel: '13.*'
            php: '8.4'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.db }}

    steps:
      - uses: actions/checkout@v7

      # Provisions only the DB this cell targets and exports DB_* to the env.
      - name: Set up ${{ matrix.db }}
        uses: ./.github/actions/setup-database
        with:
          db: ${{ matrix.db }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, pdo, pdo_sqlite, pdo_mysql, pdo_pgsql, bcmath
          # Coverage on one cell per DB backend (a single PHP/Laravel combo)
          # so Codecov merges per-flag uploads without redundant runs; every
          # other cell runs with no coverage driver for speed.
          coverage: ${{ (matrix.php == '8.4' && matrix.laravel == '12.*') && 'pcov' || 'none' }}

      - name: Constrain Laravel version
        run: composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction --dev

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          composer update --prefer-dist --no-interaction --no-progress

      # Journeys are a separate job (see below); exclude them here so the unit
      # and integration suite stays fast and they don't run twice.
      - name: Run tests
        run: vendor/bin/phpunit --exclude-group journey ${{ (matrix.php == '8.4' && matrix.laravel == '12.*') && '--coverage-clover=coverage.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage.xml
          # Tag each backend's upload so Codecov merges them per-flag.
          flags: ${{ matrix.db }}
          token: ${{ secrets.CODECOV_TOKEN }}

  journeys:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql, mariadb, pgsql]

    name: journeys · ${{ matrix.db }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up ${{ matrix.db }}
        uses: ./.github/actions/setup-database
        with:
          db: ${{ matrix.db }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, pdo, pdo_sqlite, pdo_mysql, pdo_pgsql, bcmath
          coverage: pcov

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          composer update --prefer-dist --no-interaction --no-progress

      # Runs the journey suite at the default 25 shuffles (JourneyTestCase),
      # which is fast enough for every PR. journeys-nightly.yml cranks the
      # shuffle count and randomises seeds for deeper overnight exploration.
      - name: Run journeys
        run: vendor/bin/phpunit --group journey --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage.xml
          # Same per-backend flags as the test job; Codecov merges the journey
          # coverage into each backend so the totals stay complete.
          flags: ${{ matrix.db }}
          token: ${{ secrets.CODECOV_TOKEN }}
