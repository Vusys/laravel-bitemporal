name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        db: [sqlite, mysql, mariadb, pgsql]
        exclude:
          - laravel: '13.*'
            php: '8.4'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.db }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: testing
        ports: ['33306:3306']
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=5
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_DATABASE: testing
        ports: ['33307:3306']
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5
      pgsql:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testing
        ports: ['54320:5432']
        options: >-
          --health-cmd=pg_isready --health-interval=10s
          --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, pdo, pdo_sqlite, pdo_mysql, pdo_pgsql, bcmath
          # Coverage on one cell per DB backend (a single PHP/Laravel combo)
          # so Codecov merges per-flag uploads without redundant runs; every
          # other cell runs with no coverage driver for speed.
          coverage: ${{ (matrix.php == '8.4' && matrix.laravel == '12.*') && 'pcov' || 'none' }}

      - name: Constrain Laravel version
        run: composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction --dev

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit ${{ (matrix.php == '8.4' && matrix.laravel == '12.*') && '--coverage-clover=coverage.xml' || '' }}
        env:
          DB_CONNECTION: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_DATABASE: testing
          DB_PORT: ${{ matrix.db == 'pgsql' && '54320' || matrix.db == 'mariadb' && '33307' || '33306' }}
          DB_USERNAME: ${{ matrix.db == 'pgsql' && 'postgres' || 'root' }}
          DB_PASSWORD: ${{ matrix.db == 'pgsql' && 'postgres' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage.xml
          # Tag each backend's upload so Codecov merges them per-flag.
          flags: ${{ matrix.db }}
          token: ${{ secrets.CODECOV_TOKEN }}
