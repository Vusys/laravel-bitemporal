name: infection

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  mutation:
    runs-on: ubuntu-latest
    name: Mutation testing

    # Empty unless the secret is configured. Infection only uploads to the
    # Stryker dashboard when this key is set AND the stryker logger is enabled
    # in infection.json5 — both are opt-in, so CI needs no secrets by default.
    env:
      STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Infection (PR diff mode)
        if: github.event_name == 'pull_request'
        run: composer infection:diff

      - name: Infection (full suite)
        if: github.event_name != 'pull_request'
        run: composer infection
