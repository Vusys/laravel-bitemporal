name: journeys-nightly

# High-shuffle journey exploration across the database matrix. The tests
# workflow runs journeys at 25 shuffles on every PR; this job cranks
# JOURNEY_SHUFFLES far higher and, with RUNABOUT_RANDOMIZE=1, explores fresh
# seeds every night so rare orderings surface over time. A failure prints the
# shrunk trail and a RUNABOUT_SEED / RUNABOUT_TRAIL replay line for a
# deterministic local repro.

on:
  schedule:
    # 03:17 UTC daily — an off-the-hour minute to dodge scheduler congestion.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      shuffles:
        description: 'Shuffles per journey'
        required: false
        default: '500'

permissions:
  contents: read

jobs:
  journeys:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql, mariadb, pgsql]

    name: journeys · ${{ matrix.db }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up ${{ matrix.db }}
        uses: ./.github/actions/setup-database
        with:
          db: ${{ matrix.db }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, pdo, pdo_sqlite, pdo_mysql, pdo_pgsql, bcmath
          coverage: none

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run journeys (${{ matrix.db }})
        run: vendor/bin/phpunit --group journey
        env:
          JOURNEY_SHUFFLES: ${{ github.event.inputs.shuffles || '500' }}
          # Explore fresh seeds each run; a failure still prints its seed to replay.
          RUNABOUT_RANDOMIZE: '1'
          # Print a per-journey trail-coverage summary (orderings explored / missed).
          RUNABOUT_COVERAGE: '1'
